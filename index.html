<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Visualizador 360° Rápido</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #viewer-container { width: 100%; height: 100%; position: relative; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }
        
        /* Botões flutuantes */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            background: #1e2a3a;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2c4c6e; transform: scale(1.02); }
        .vr-btn { background: #ff5722; }
        .vr-btn:hover { background: #ff784e; }
        
        /* Loading simples */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-family: monospace;
            font-size: 18px;
            z-index: 200;
            pointer-events: none;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        
        .instrucao {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #ccc;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        
        @media (max-width: 640px) {
            button { padding: 5px 12px; font-size: 12px; }
            .controls { gap: 8px; padding: 6px 12px; }
            #loading { font-size: 14px; white-space: nowrap; padding: 8px 18px; }
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "photo-sphere-viewer": "https://unpkg.com/photo-sphere-viewer@5.11.0/dist/photo-sphere-viewer.module.js",
                "photo-sphere-viewer/dist/plugins/virtual-reality.module.js": "https://unpkg.com/photo-sphere-viewer@5.11.0/dist/plugins/virtual-reality.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="viewer-container"></div>
    <div id="loading">🌀 Carregando panorama...</div>
    <div class="controls" id="controls" style="display: none;">
        <button id="fullscreen">⛶ Tela Cheia</button>
        <button id="vr" class="vr-btn">🥽 VR</button>
    </div>
    <div class="instrucao">🖱️ Arraste para olhar | 🥽 VR</div>

    <script type="module">
        import { Viewer } from 'photo-sphere-viewer';
        import { VirtualRealityPlugin } from 'photo-sphere-viewer/dist/plugins/virtual-reality.module.js';

        // Imagem pública rápida e garantida (Panorama da Terra - 2048x1024)
        const IMAGEM_URL = "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg";
        
        let viewer = null;
        const container = document.getElementById('viewer-container');
        const loadingDiv = document.getElementById('loading');
        const controlsDiv = document.getElementById('controls');
        
        async function iniciar() {
            try {
                loadingDiv.style.display = 'flex';
                viewer = new Viewer({
                    container: container,
                    panorama: IMAGEM_URL,
                    caption: '🌍 Panorama 360°',
                    navbar: false,
                    defaultZoomLvl: 0,
                    mousewheel: true,
                    mousemove: true,
                    touchmove: true,
                    autorotate: false,
                    keyboard: true,
                    renderer: { antialias: true },
                    plugins: [[VirtualRealityPlugin, { defaultZoom: 0 }]]
                });
                
                await viewer.ready();
                loadingDiv.style.display = 'none';
                controlsDiv.style.display = 'flex';
                
                // Plugin VR
                const vrPlugin = viewer.getPlugin(VirtualRealityPlugin);
                const vrBtn = document.getElementById('vr');
                vrBtn.onclick = () => {
                    if (vrPlugin.isEnabled()) vrPlugin.exit();
                    else vrPlugin.enter();
                };
                vrPlugin.addEventListener('enter-vr', () => vrBtn.innerHTML = '🕶️ Sair VR');
                vrPlugin.addEventListener('exit-vr', () => vrBtn.innerHTML = '🥽 VR');
                
                // Tela cheia
                const fsBtn = document.getElementById('fullscreen');
                fsBtn.onclick = () => {
                    if (!document.fullscreenElement) container.requestFullscreen();
                    else document.exitFullscreen();
                };
                document.addEventListener('fullscreenchange', () => {
                    fsBtn.innerHTML = document.fullscreenElement ? '✕ Sair' : '⛶ Tela Cheia';
                });
                
                window.addEventListener('resize', () => viewer?.resize());
            } catch (err) {
                loadingDiv.innerHTML = '❌ Erro ao carregar imagem. Recarregue a página.';
                console.error(err);
            }
        }
        
        iniciar();
        
        // Evita scroll em dispositivos móveis durante arrasto
        document.body.addEventListener('touchmove', (e) => {
            if (e.target?.nodeName === 'CANVAS') e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
