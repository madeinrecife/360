<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
user-scalable=no">

<title>Viewer 360 PRO</title>

<style>

/* ======================================
   RESET
====================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

/* ======================================
   VIEWER
====================================== */

#viewer{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
}

/* ======================================
   LOADING
====================================== */

#loadingScreen{

    position:fixed;
    inset:0;

    background:#000;

    z-index:9999;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    transition:1s;

}

.loader{

    width:80px;
    height:80px;

    border-radius:50%;

    border:5px solid rgba(255,255,255,0.15);

    border-top:5px solid #ffffff;

    animation:spin 1s linear infinite;

}

.loadingText{

    color:#fff;

    margin-top:20px;

    font-size:14px;

    letter-spacing:3px;

}

/* ======================================
   MENU
====================================== */

#menu{

    position:fixed;

    top:15px;
    right:15px;

    z-index:9999;

    display:flex;

    gap:10px;

    flex-wrap:wrap;

}

.btn{

    border:none;

    background:rgba(0,0,0,0.6);

    color:#fff;

    padding:12px 16px;

    border-radius:14px;

    cursor:pointer;

    transition:0.3s;

    backdrop-filter:blur(10px);

    font-size:14px;

}

.btn:hover{

    background:rgba(255,255,255,0.2);

}

/* ======================================
   HOTSPOT
====================================== */

.hotspot{

    position:absolute;

    width:22px;
    height:22px;

    border-radius:50%;

    background:#fff;

    box-shadow:0 0 20px #fff;

    z-index:9999;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    animation:pulse 2s infinite;

    cursor:pointer;

}

#infoBox{

    position:fixed;

    left:20px;
    bottom:20px;

    background:rgba(0,0,0,0.7);

    color:#fff;

    padding:15px;

    border-radius:12px;

    z-index:9999;

    display:none;

}

/* ======================================
   ANIMAÇÕES
====================================== */

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}

@keyframes pulse{

    0%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.3);
    }

    100%{
        transform:translate(-50%,-50%) scale(1);
    }

}

/* ======================================
   MOBILE
====================================== */

@media(max-width:768px){

    .btn{

        padding:10px 12px;

        font-size:12px;

    }

}

</style>

</head>

<body>

<!-- ======================================
     LOADING
====================================== -->

<div id="loadingScreen">

    <div class="loader"></div>

    <div class="loadingText">
        CARREGANDO FOTO 360°
    </div>

</div>

<!-- ======================================
     MENU
====================================== -->

<div id="menu">

    <button class="btn"
    id="fullscreenBtn">

        Tela Cheia

    </button>

    <button class="btn"
    id="gyroBtn">

        Gyroscope

    </button>

    <button class="btn"
    id="rotateBtn">

        Auto Rotate

    </button>

    <button class="btn"
    id="zoomInBtn">

        Zoom +

    </button>

    <button class="btn"
    id="zoomOutBtn">

        Zoom -

    </button>

</div>

<!-- ======================================
     HOTSPOT
====================================== -->

<div class="hotspot"
id="hotspot"></div>

<div id="infoBox">
    Hotspot interativo 360°
</div>

<!-- ======================================
     VIEWER
====================================== -->

<div id="viewer"></div>

<!-- ======================================
     THREE JS
====================================== -->

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<!-- ======================================
     ORBIT CONTROLS
====================================== -->

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<!-- ======================================
     DEVICE ORIENTATION
====================================== -->

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/DeviceOrientationControls.js"></script>

<script>

/* ======================================
   FOTO 360 LOCAL
====================================== */

/*

COLOQUE SUA FOTO 360
NA MESMA PASTA DO HTML

EXEMPLO:

index.html
foto360.jpg

*/

const image360 = "foto360.jpg";

/* ======================================
   VARIÁVEIS
====================================== */

let scene;
let camera;
let renderer;
let controls;
let gyroControls;
let sphere;

let autoRotate = true;
let gyroEnabled = false;

/* ======================================
   INIT
====================================== */

init();

function init(){

    scene =
    new THREE.Scene();

    camera =
    new THREE.PerspectiveCamera(

        75,

        window.innerWidth /
        window.innerHeight,

        1,

        2000

    );

    camera.position.set(0,0,0.1);

    renderer =
    new THREE.WebGLRenderer({

        antialias:true

    });

    renderer.setPixelRatio(
        window.devicePixelRatio
    );

    renderer.setSize(

        window.innerWidth,

        window.innerHeight

    );

    document
    .getElementById("viewer")
    .appendChild(renderer.domElement);

    /* ======================================
       ESFERA 360
    ====================================== */

    const geometry =
    new THREE.SphereGeometry(

        500,
        120,
        80

    );

    geometry.scale(-1,1,1);

    /* ======================================
       LOADER
    ====================================== */

    const textureLoader =
    new THREE.TextureLoader();

    textureLoader.load(

        image360,

        (texture)=>{

            texture.colorSpace =
            THREE.SRGBColorSpace;

            texture.mapping =
            THREE.EquirectangularReflectionMapping;

            texture.minFilter =
            THREE.LinearFilter;

            texture.magFilter =
            THREE.LinearFilter;

            texture.needsUpdate = true;

            texture.anisotropy =
            renderer.capabilities
            .getMaxAnisotropy();

            const material =
            new THREE.MeshBasicMaterial({

                map:texture

            });

            sphere =
            new THREE.Mesh(

                geometry,
                material

            );

            scene.add(sphere);

            document
            .getElementById("loadingScreen")
            .style.opacity = "0";

            setTimeout(()=>{

                document
                .getElementById("loadingScreen")
                .style.display = "none";

            },1000);

            console.log(
                "Foto 360 carregada"
            );

        },

        (xhr)=>{

            if(xhr.total){

                const percent =
                (xhr.loaded / xhr.total) * 100;

                console.log(

                    "Carregando:",
                    percent.toFixed(0) + "%"

                );

            }

        },

        (error)=>{

            console.error(
                "Erro ao carregar:",
                error
            );

            alert(

                "Erro ao carregar foto360.jpg\n\n" +

                "Verifique se:\n" +

                "- a imagem está na mesma pasta\n" +
                "- o nome está correto\n" +
                "- a imagem é JPG/PNG\n" +
                "- a foto é 2:1"

            );

        }

    );

    /* ======================================
       CONTROLES
    ====================================== */

    controls =
    new THREE.OrbitControls(

        camera,
        renderer.domElement

    );

    controls.enableDamping = true;

    controls.dampingFactor = 0.05;

    controls.enableZoom = true;

    controls.enablePan = false;

    controls.rotateSpeed = -0.25;

    /* ======================================
       GYROSCOPE
    ====================================== */

    gyroControls =
    new THREE.DeviceOrientationControls(
        camera
    );

    animate();

}

/* ======================================
   ANIMAÇÃO
====================================== */

function animate(){

    requestAnimationFrame(
        animate
    );

    if(autoRotate && sphere){

        sphere.rotation.y +=
        0.0007;

    }

    controls.update();

    if(gyroEnabled){

        gyroControls.update();

    }

    renderer.render(
        scene,
        camera
    );

}

/* ======================================
   FULLSCREEN
====================================== */

document
.getElementById("fullscreenBtn")
.addEventListener("click",()=>{

    if(!document.fullscreenElement){

        document.documentElement
        .requestFullscreen();

    }else{

        document.exitFullscreen();

    }

});

/* ======================================
   AUTO ROTATE
====================================== */

document
.getElementById("rotateBtn")
.addEventListener("click",()=>{

    autoRotate =
    !autoRotate;

});

/* ======================================
   GYROSCOPE
====================================== */

document
.getElementById("gyroBtn")
.addEventListener("click",async()=>{

    if(

        typeof DeviceOrientationEvent
        !== "undefined"

        &&

        typeof DeviceOrientationEvent
        .requestPermission ===
        "function"

    ){

        try{

            const permission =
            await DeviceOrientationEvent
            .requestPermission();

            if(
                permission ===
                "granted"
            ){

                gyroEnabled = true;

            }

        }catch(e){

            console.error(e);

        }

    }else{

        gyroEnabled = true;

    }

});

/* ======================================
   ZOOM
====================================== */

document
.getElementById("zoomInBtn")
.addEventListener("click",()=>{

    camera.fov -= 5;

    if(camera.fov < 30){

        camera.fov = 30;

    }

    camera.updateProjectionMatrix();

});

document
.getElementById("zoomOutBtn")
.addEventListener("click",()=>{

    camera.fov += 5;

    if(camera.fov > 100){

        camera.fov = 100;

    }

    camera.updateProjectionMatrix();

});

/* ======================================
   HOTSPOT
====================================== */

document
.getElementById("hotspot")
.addEventListener("click",()=>{

    const box =
    document
    .getElementById("infoBox");

    box.style.display =
    "block";

    setTimeout(()=>{

        box.style.display =
        "none";

    },3000);

});

/* ======================================
   RESPONSIVO
====================================== */

window.addEventListener("resize",()=>{

    camera.aspect =
    window.innerWidth /
    window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(

        window.innerWidth,

        window.innerHeight

    );

});

</script>

</body>
</html>
